name: Bump tool version

on:
  repository_dispatch:
    types: [bump-tool]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      TOOL: ${{ github.event.client_payload.tool }}
      VERSION: ${{ github.event.client_payload.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.BUMP_BOT_TOKEN }}

      - name: Detect current version
        id: old
        run: |
          OLD=$(grep "vfox:misut/mise-${TOOL}" mise.toml \
            | grep -oP '= "\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$OLD" >> "$GITHUB_OUTPUT"

      - name: Update mise.toml
        run: |
          OLD="${{ steps.old.outputs.version }}"
          sed -i "s|\"vfox:misut/mise-${TOOL}\" = \"${OLD}\"|\"vfox:misut/mise-${TOOL}\" = \"${VERSION}\"|" mise.toml

      - name: Regenerate CMakeLists.txt
        if: env.TOOL == 'exon'
        run: |
          gh release download "v${VERSION}" -R misut/exon -p "exon-*-x86_64-linux-gnu.tar.gz"
          tar xzf exon-*.tar.gz && rm exon-*.tar.gz
          chmod +x exon && mv exon /usr/local/bin/
          exon sync
        env:
          GH_TOKEN: ${{ secrets.BUMP_BOT_TOKEN }}

      - name: Create and auto-merge PR
        run: |
          BRANCH="chore/bump-${TOOL}-v${VERSION}"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: bump ${TOOL} to v${VERSION}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push --force origin "HEAD:$BRANCH"
          else
            git push origin "$BRANCH"
          fi
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // empty')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --title "chore: bump ${TOOL} to v${VERSION}" \
              --body "Automated bump triggered by [${TOOL} v${VERSION}](https://github.com/misut/${TOOL}/releases/tag/v${VERSION})." \
              --base main \
              --head "$BRANCH")
          fi
          gh pr merge "$PR_URL" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.BUMP_BOT_TOKEN }}
