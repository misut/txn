name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
      - ".claude/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Cache toolchains
        uses: actions/cache@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.intron.toml') }}

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && rm intron-*.tar.gz
          mkdir -p "$HOME/.intron/bin" && mv intron "$HOME/.intron/bin/"
          echo "$HOME/.intron/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          if [ "$(uname -m)" = "aarch64" ] && [ "$RUNNER_OS" = "Linux" ]; then
            intron install llvm 22.1.2
            intron install cmake 4.3.1
            sudo apt-get update && sudo apt-get install -y ninja-build
          else
            intron install
          fi

      - name: Cache exon
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/exon
          key: exon-v${{ steps.tool-versions.outputs.exon }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install exon
        run: |
          if [ ! -x "$HOME/.local/bin/exon" ]; then
            gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
            tar xzf exon-*.tar.gz && rm exon-*.tar.gz
            mkdir -p "$HOME/.local/bin" && mv exon "$HOME/.local/bin/"
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test
        run: intron exec -- exon test

  wasm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Cache toolchains (wasm)
        uses: actions/cache@v5
        with:
          path: ~/.intron/toolchains
          key: intron-wasm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.intron.toml') }}-wasi32-wasmtime43.0.1

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-linux-gnu.tar.gz"
          tar xzf intron-*.tar.gz && rm intron-*.tar.gz
          mkdir -p "$HOME/.intron/bin" && mv intron "$HOME/.intron/bin/"
          echo "$HOME/.intron/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install
          intron install wasi-sdk 32
          intron install wasmtime 43.0.1
          intron default wasmtime 43.0.1

      - name: Cache exon
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/exon
          key: exon-v${{ steps.tool-versions.outputs.exon }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install exon
        run: |
          if [ ! -x "$HOME/.local/bin/exon" ]; then
            gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-linux-gnu.tar.gz"
            tar xzf exon-*.tar.gz && rm exon-*.tar.gz
            mkdir -p "$HOME/.local/bin" && mv exon "$HOME/.local/bin/"
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test wasm
        run: intron exec -- exon test --target wasm32-wasi

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Cache toolchains
        uses: actions/cache@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.intron.toml') }}

      - name: Install intron
        shell: pwsh
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-pc-windows-msvc.zip"
          Expand-Archive -Path intron-*.zip -DestinationPath .
          Remove-Item intron-*.zip
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.intron\bin" | Out-Null
          Move-Item -Path intron.exe -Destination "$env:USERPROFILE\.intron\bin\intron.exe"
          echo "$env:USERPROFILE\.intron\bin" >> $env:GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        shell: pwsh
        run: intron install

      - name: Cache exon
        uses: actions/cache@v5
        with:
          path: ~/.local/bin/exon.exe
          key: exon-v${{ steps.tool-versions.outputs.exon }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install exon
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.local\bin\exon.exe")) {
            gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-pc-windows-msvc.zip"
            Expand-Archive -Path exon-*.zip -DestinationPath .
            mkdir -Force "$env:USERPROFILE\.local\bin" | Out-Null
            mv exon.exe "$env:USERPROFILE\.local\bin\"
          }
          echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Test
        shell: pwsh
        run: intron exec -- exon test
